<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aswang Chronicles</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/horror.css">
    <link rel="stylesheet" href="css/hud.css">
</head>
<body>
    <!-- Game canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD (crosshair, ammo, health) -->
    <div id="crosshair">＋</div>
    <div id="ammoDisplay">🔫 7 / 7</div>
    <div id="healthDisplay">❤️ 100</div>
    <div id="messageDisplay"></div>

    <!-- Jumpscare overlay -->
    <div id="jumpscareOverlay">
        <div id="jumpscareText">HALA!</div>
    </div>

    <!-- Babylon.js CDN -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>

    <!-- Game modules (type="module" requires server) -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
